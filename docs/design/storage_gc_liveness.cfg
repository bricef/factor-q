\* TLC liveness configuration for storage_gc.tla (the FairSpec).
\*   java -cp tla2tools.jar tlc2.TLC -config storage_gc_liveness.cfg storage_gc.tla
\*
\* No CONSTRAINT: a state constraint corrupts TLC's ENABLED/fairness reasoning and
\* yields spurious liveness counterexamples; the model is naturally finite anyway.
\* MaxGen=3 gives generation headroom (real generations are unbounded tokens), the
\* reachability audit is modelled as STRONG fairness (Fairness in the spec), and
\* crashes are bounded (MaxCrash) so they eventually stop -- liveness holds only
\* modulo finitely many faults.
CONSTANTS
    Hashes = {h1}
    Writers = {w1, w2}
    MaxGen = 3
    MaxRef = 5
    MaxObj = 2
    MaxCrash = 2
SPECIFICATION FairSpec
PROPERTY GCProgress
PROPERTY WriterProgress
PROPERTY EventualReclaim
