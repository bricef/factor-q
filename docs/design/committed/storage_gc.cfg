\* TLC configuration for storage_gc.tla.
\*   tlc storage_gc.tla            (uses this file automatically)
\* Safety check.  Verified with TLC and the storage-gc-check.py cross-check.
CONSTANTS
    Hashes = {h1, h2}
    Writers = {w1, w2}
    MaxGen = 1
    MaxRef = 3
    MaxObj = 2
    MaxCrash = 2
SPECIFICATION Spec
INVARIANT TypeOK
INVARIANT Safe
INVARIANT OneAvailable
INVARIANT LiveHasFile
INVARIANT ClaimedHasNoRefs
INVARIANT RefcountDominates
CONSTRAINT StateBound
\* For liveness, use storage_gc_liveness.cfg (FairSpec + the temporal properties).
