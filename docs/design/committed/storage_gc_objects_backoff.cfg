\* TLC safety configuration for storage_gc_objects_backoff.tla (issue #173).
\*   java -cp tla2tools.jar tlc2.TLC storage_gc_objects_backoff.tla
CONSTANTS
    Cids = {c1, c2}
    Writers = {w1, w2}
    MaxRef = 3
    MaxName = 2
    MaxCrash = 2
SPECIFICATION Spec
INVARIANT TypeOK
INVARIANT SafeObj
INVARIANT LiveHasManifest
INVARIANT ClaimedHasNoRefs
INVARIANT RefcountDominates
CONSTRAINT StateBound
\* For liveness, use storage_gc_objects_backoff_liveness.cfg (FairSpec + properties).
