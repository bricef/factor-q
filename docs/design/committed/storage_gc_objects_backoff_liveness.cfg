\* TLC liveness configuration for storage_gc_objects_backoff.tla (FairSpec).
\*   java -cp tla2tools.jar tlc2.TLC -config storage_gc_objects_backoff_liveness.cfg storage_gc_objects_backoff.tla
\* No CONSTRAINT: a state constraint corrupts TLC's fairness reasoning; the model is
\* naturally finite. The reachability audit is modelled as STRONG fairness (Fairness
\* in the spec); crashes are bounded (MaxCrash) so liveness holds modulo finitely
\* many faults.
CONSTANTS
    Cids = {c1}
    Writers = {w1, w2}
    MaxRef = 4
    MaxName = 2
    MaxCrash = 2
SPECIFICATION FairSpec
PROPERTY GCProgress
PROPERTY WriterProgress
PROPERTY EventualReclaim
