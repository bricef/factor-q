\* TLC liveness configuration for storage_gc_objects_gen.tla (FairSpec).
\* Minimal bounds: liveness (temporal) checking is far heavier than safety, and the
\* generation model is isomorphic to storage_gc.tla, so tight bounds suffice to
\* exercise GCProgress / WriterProgress / EventualReclaim with the generation mint.
CONSTANTS
    Cids = {c1}
    Writers = {w1, w2}
    MaxGen = 2
    MaxRef = 3
    MaxName = 1
    MaxCrash = 1
SPECIFICATION FairSpec
PROPERTY GCProgress
PROPERTY WriterProgress
PROPERTY EventualReclaim
