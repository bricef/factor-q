[package]
name = "fq-store"
version = "0.1.0"
edition = "2024"
license = "BUSL-1.1"
description = "factor-q content-addressed storage + semantic index service"
repository = "https://github.com/bricef/factor-q"

[dependencies]
async-trait = "0.1"
blake3 = "1"
fastcdc = "3"
hex = "0.4"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
thiserror = "2"
tokio = { version = "1", features = ["fs", "io-util", "rt", "rt-multi-thread", "macros"] }

[dev-dependencies]
proptest = "1"
tempfile = "3"
tokio = { version = "1", features = ["full"] }

# Mirror the fq-runtime workspace lint policy: a clean build has zero
# warnings, and that is enforced.
[lints.rust]
warnings = "deny"

[lints.clippy]
all = "deny"
