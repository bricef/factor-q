[package]
name = "fq-cli"
version.workspace = true
edition.workspace = true
description.workspace = true
repository.workspace = true
license.workspace = true

[[bin]]
name = "fq"
path = "src/main.rs"

# cargo-binstall: fetch the pre-built `fq` binary from GitHub Releases
# instead of compiling. Must match the release artifact naming (see
# scripts/package.sh and .github/workflows/release.yml).
[package.metadata.binstall]
pkg-url = "{ repo }/releases/download/v{ version }/factor-q-{ version }-{ target }.tar.gz"
pkg-fmt = "tgz"
bin-dir = "fq"

[dependencies]
fq-runtime = { path = "../fq-runtime" }
anyhow = "1"
async-nats = "0.38"
chrono = "0.4"
clap = { version = "4", features = ["derive", "env"] }
futures = "0.3"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tokio = { version = "1", features = ["full"] }
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter", "json"] }
uuid = { version = "1", features = ["v7"] }

[dev-dependencies]
tempfile = "3"

[lints]
workspace = true
