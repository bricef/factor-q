[package]
name = "fq-cli"
version.workspace = true
edition.workspace = true

[[bin]]
name = "fq"
path = "src/main.rs"

[dependencies]
fq-runtime = { path = "../fq-runtime" }
anyhow = "1"
clap = { version = "4", features = ["derive", "env"] }
futures = "0.3"
serde_json = "1"
tokio = { version = "1", features = ["full"] }
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter", "json"] }
