[package]
name = "fq-runtime"
version.workspace = true
edition.workspace = true

[dependencies]
fq-tools = { path = "../fq-tools" }
async-nats = "0.38"
tokio = { version = "1", features = ["full"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
serde_yaml = "0.9"
sqlx = { version = "0.8", features = ["runtime-tokio", "sqlite"] }
tracing = "0.1"
thiserror = "2"
