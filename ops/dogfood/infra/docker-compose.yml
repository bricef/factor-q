services:
  nats:
    image: nats:latest
    container_name: fq-dogfood-nats
    # Survive reboots without a supervisor: docker restarts the broker
    # whenever the docker daemon comes up.
    restart: unless-stopped
    command: ["--config", "/etc/nats/nats.conf"]
    ports:
      # Loopback-only: this broker is unauthenticated and must not be
      # reachable off-box (factor-q assessment critique 4).
      - "127.0.0.1:4223:4222"
      - "127.0.0.1:8223:8222"
    volumes:
      - ./nats.conf:/etc/nats/nats.conf:ro
      - nats-data:/data/nats

  # The single public door to the operator dashboard (#105): TLS +
  # basic-auth (with a persistent session cookie, see Caddyfile) in
  # front of the loopback-bound fq-dashboard. Host networking so it can
  # reach 127.0.0.1:9472; TLS-only — no plain-HTTP listener at all.
  # Everything else on this host stays loopback-bound.
  caddy:
    image: caddy:2
    container_name: fq-dogfood-caddy
    restart: unless-stopped
    network_mode: host
    # DASH_USER / DASH_HASH (bcrypt via `caddy hash-password`) /
    # DASH_COOKIE (session secret, `openssl rand -hex 32`) — a
    # host-side chmod-600 file, never committed. See the README's
    # dashboard section for the setup. Env edits need a container
    # recreate (`up -d --force-recreate caddy`), not just a reload.
    env_file:
      - ../.secrets/caddy.env
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config

volumes:
  nats-data:
  caddy-data:
  caddy-config:
