# NATS for the fq-dogfood runtime — deliberately separate from the
# factor-q repo's dev/test broker on 4222 so the daemon and the test
# suite never share streams (the daemon's dispatcher steals test
# triggers otherwise; see the factor-q backlog § CI / test flakiness).
#
# Ports are container-internal; the host binding (127.0.0.1:4223 /
# :8223) lives in docker-compose.yml.

listen: 0.0.0.0:4222
http_port: 8222

# factor-q's llm_request events carry the full conversation, which can
# exceed NATS's 1MB default on a long invocation with large tool outputs
# (this crashed an m0-review-fix run and poisoned the archive-retry
# loop, 2026-07-07). 16MB is dogfood headroom; the real fix is bounding
# event size — large bodies to CAS by reference — see the backlog.
max_payload: 16MB

jetstream {
    store_dir: /data/nats

    # One agent running once a day: modest limits are plenty.
    max_memory_store: 256MB
    max_file_store: 10GB
}
