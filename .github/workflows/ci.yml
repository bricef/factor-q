name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read # paths-filter reads the PR's changed-file list

# Every build job drives its checks through a `just` target, so CI stays
# isomorphic with the local dev workflow. Setup steps (toolchains) are the
# only non-just glue.
#
# `changes` path-filters so the expensive Rust and Go builds run their
# steps only when their code (or the build recipe / this workflow) actually
# changes — a docs-only change skips them. The build jobs still *run* and
# still report their required status check (they just do nothing when there
# is nothing to build), so branch protection is never left waiting on a
# check that never arrives — the reason we gate steps, not the whole job.
#
# The Rust gate is two independent jobs — `runtime-ci` (needs NATS + Node
# for the bus/MCP integration tests) and `store-ci` (hermetic) — so a red
# in one never masks the other's results (#38). `rust-ci` is a thin
# aggregate that fails iff either half fails; it keeps the "Rust CI"
# required-status-check name, so the split needs no branch-protection edit.
jobs:
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      rust: ${{ steps.filter.outputs.rust }}
      go: ${{ steps.filter.outputs.go }}
      dashboard: ${{ steps.filter.outputs.dashboard }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            rust:
              - 'services/**'
              - 'justfile'
              - 'rust-toolchain.toml'
              - '.github/workflows/**'
            go:
              - 'adapters/**'
              - 'justfile'
              - '.github/workflows/**'
            dashboard:
              - 'services/fq-dashboard/**'
              - 'scripts/dashboard-screenshots.sh'
              - 'scripts/dashboard-pr-comment.sh'
              - '.github/workflows/ci.yml'

  docs-lint:
    name: Docs lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # markdownlint runs via npx inside `just lint-docs`; setup-node
      # provides npx (a Rust container / minimal runner has none).
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - uses: extractions/setup-just@v3
      - run: just lint-docs
      # Relative-link integrity across all repo markdown (stdlib Python,
      # preinstalled on the runner).
      - run: just check-links

  runtime-ci:
    name: Runtime CI
    needs: changes
    runs-on: ubuntu-latest
    steps:
      - if: needs.changes.outputs.rust != 'true'
        run: echo "No Rust-relevant changes — skipping the runtime build."
      - if: needs.changes.outputs.rust == 'true'
        uses: actions/checkout@v4
      # Keep the version ref in lockstep with rust-toolchain.toml (#102) —
      # rustup enforces the pin either way; matching here avoids installing
      # a second, unused toolchain.
      - if: needs.changes.outputs.rust == 'true'
        uses: dtolnay/rust-toolchain@1.95.0
        with:
          components: rustfmt, clippy
      - if: needs.changes.outputs.rust == 'true'
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: services/fq-runtime
      # The MCP integration tests spawn the reference server via npx.
      - if: needs.changes.outputs.rust == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: "20"
      - if: needs.changes.outputs.rust == 'true'
        uses: extractions/setup-just@v3
      # Bring up NATS exactly as dev does (JetStream via
      # infrastructure/nats.conf), then wait for it before the
      # bus/integration tests run.
      - if: needs.changes.outputs.rust == 'true'
        run: just infra-up
      - if: needs.changes.outputs.rust == 'true'
        run: just infra-wait
      - if: needs.changes.outputs.rust == 'true'
        run: just runtime-ci
      - if: always() && needs.changes.outputs.rust == 'true'
        run: just infra-down

  store-ci:
    name: Store CI
    needs: changes
    runs-on: ubuntu-latest
    steps:
      - if: needs.changes.outputs.rust != 'true'
        run: echo "No Rust-relevant changes — skipping the store build."
      - if: needs.changes.outputs.rust == 'true'
        uses: actions/checkout@v4
      # Same lockstep note as runtime-ci: match rust-toolchain.toml.
      - if: needs.changes.outputs.rust == 'true'
        uses: dtolnay/rust-toolchain@1.95.0
        with:
          components: rustfmt, clippy
      - if: needs.changes.outputs.rust == 'true'
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: services/fq-store
      - if: needs.changes.outputs.rust == 'true'
        uses: extractions/setup-just@v3
      # Hermetic suite — no NATS broker, no Node toolchain needed.
      - if: needs.changes.outputs.rust == 'true'
        run: just store-ci

  # Aggregate gate: keeps the "Rust CI" required-status-check name so the
  # runtime/store split needs no branch-protection change. Green iff both
  # halves are green; the Actions UI still shows which half failed.
  rust-ci:
    name: Rust CI
    needs: [runtime-ci, store-ci, dashboard-ci]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - run: |
          echo "runtime-ci:   ${{ needs.runtime-ci.result }}"
          echo "store-ci:     ${{ needs.store-ci.result }}"
          echo "dashboard-ci: ${{ needs.dashboard-ci.result }}"
          if [ "${{ needs.runtime-ci.result }}" != "success" ] || [ "${{ needs.store-ci.result }}" != "success" ] || [ "${{ needs.dashboard-ci.result }}" != "success" ]; then
            echo "::error::a Rust suite failed — see the Runtime CI / Store CI jobs above"
            exit 1
          fi

  dashboard-ci:
    name: Dashboard CI
    needs: changes
    runs-on: ubuntu-latest
    steps:
      - if: needs.changes.outputs.rust != 'true'
        run: echo "No Rust-relevant changes — skipping the dashboard build."
      - if: needs.changes.outputs.rust == 'true'
        uses: actions/checkout@v4
      # Keep in lockstep with rust-toolchain.toml (#102).
      - if: needs.changes.outputs.rust == 'true'
        uses: dtolnay/rust-toolchain@1.95.0
        with:
          components: rustfmt, clippy
      - if: needs.changes.outputs.rust == 'true'
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: services/fq-dashboard
      - if: needs.changes.outputs.rust == 'true'
        uses: extractions/setup-just@v3
      # Hermetic — the router tests spin their own read service over a
      # temp DB; no broker, no Node.
      - if: needs.changes.outputs.rust == 'true'
        run: just dashboard-ci

  # Visual artifact, not a required check: when dashboard code changes,
  # render every page from deterministic fixtures and screenshot them
  # (headless chrome over file:// — no daemon, no broker), so the PR run
  # carries reviewable images of what the dashboard now looks like —
  # both as a run artifact and as a self-renewing gallery comment on
  # the PR (images hosted on the ci/dashboard-screenshots blob branch).
  dashboard-screenshots:
    name: Dashboard screenshots
    needs: changes
    runs-on: ubuntu-latest
    # Elevated for this job only: push the ci/dashboard-screenshots
    # branch + upsert the PR gallery comment. The workflow default
    # stays read-only.
    permissions:
      contents: write
      pull-requests: write
    steps:
      - if: needs.changes.outputs.dashboard != 'true'
        run: echo "No dashboard changes — skipping screenshots."
      - if: needs.changes.outputs.dashboard == 'true'
        uses: actions/checkout@v4
      # Keep in lockstep with rust-toolchain.toml (#102).
      - if: needs.changes.outputs.dashboard == 'true'
        uses: dtolnay/rust-toolchain@1.95.0
      - if: needs.changes.outputs.dashboard == 'true'
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            services/fq-dashboard
            services/fq-runtime
      - if: needs.changes.outputs.dashboard == 'true'
        uses: extractions/setup-just@v3
      # ubuntu-latest ships google-chrome; the script resolves it.
      - if: needs.changes.outputs.dashboard == 'true'
        run: just dashboard-screenshots
      - if: needs.changes.outputs.dashboard == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: dashboard-screenshots
          path: dist/dashboard-screenshots/*.png
          if-no-files-found: error
      # The gallery comment: PR context only, and only for same-repo
      # branches (a fork PR's token is read-only anyway).
      - if: >-
          needs.changes.outputs.dashboard == 'true' &&
          github.event_name == 'pull_request' &&
          github.event.pull_request.head.repo.full_name == github.repository
        run: >-
          bash scripts/dashboard-pr-comment.sh dist/dashboard-screenshots
          "${{ github.event.pull_request.number }}"
          "${{ github.event.pull_request.head.sha }}"
        env:
          GH_TOKEN: ${{ github.token }}

  go-ci:
    name: Go adapters
    needs: changes
    runs-on: ubuntu-latest
    steps:
      - if: needs.changes.outputs.go != 'true'
        run: echo "No Go-relevant changes — skipping the build."
      - if: needs.changes.outputs.go == 'true'
        uses: actions/checkout@v4
      - if: needs.changes.outputs.go == 'true'
        uses: actions/setup-go@v5
        with:
          go-version-file: adapters/github-watcher/go.mod
      - if: needs.changes.outputs.go == 'true'
        uses: extractions/setup-just@v3
      - if: needs.changes.outputs.go == 'true'
        run: just go-ci
