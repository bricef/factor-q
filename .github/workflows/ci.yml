name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read # paths-filter reads the PR's changed-file list

# Every build job drives its checks through a `just` target, so CI stays
# isomorphic with the local dev workflow. Setup steps (toolchains) are the
# only non-just glue.
#
# `changes` path-filters so the expensive Rust and Go builds run their
# steps only when their code (or the build recipe / this workflow) actually
# changes — a docs-only change skips them. The build jobs still *run* and
# still report their required status check (they just do nothing when there
# is nothing to build), so branch protection is never left waiting on a
# check that never arrives — the reason we gate steps, not the whole job.
#
# The Rust gate is independent per-workspace jobs — `runtime-ci` (installs the
# pinned nats-server the per-test brokers use, plus Node for the MCP integration
# tests), `store-ci` (its grant-bus test spawns private brokers likewise), and
# `dashboard-ci` (hermetic) — so a red in one never masks another's
# results (#38). Each is triggered by its own `changes` path filter
# (`runtime`/`store`/`dashboard`), so a store-only PR no longer rebuilds the
# runtime suite (or spins up NATS/Node), and vice versa. `rust-ci` is a thin
# aggregate that fails iff any half fails; it keeps the "Rust CI"
# required-status-check name, so the split needs no branch-protection edit.
jobs:
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      runtime: ${{ steps.filter.outputs.runtime }}
      store: ${{ steps.filter.outputs.store }}
      go: ${{ steps.filter.outputs.go }}
      dashboard: ${{ steps.filter.outputs.dashboard }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            # Per-suite Rust filters (#51) so each build job triggers only on
            # its own changes. The shared entries — the top-level justfile, the
            # toolchain pin, and any workflow edit — conservatively trigger every
            # suite. fq-dashboard path-depends on fq-runtime, so dashboard-ci
            # gates on `runtime || dashboard` (see its `if:` below) rather than
            # getting a fourth filter that would duplicate the `runtime` globs.
            runtime:
              - 'services/fq-runtime/**'
              # The shared test-only crate is a dev-dependency of the runtime
              # workspace (#233); its gate runs in this job.
              - 'services/fq-test-support/**'
              - 'justfile'
              - 'rust-toolchain.toml'
              - '.nats-version'
              - '.nats-checksums'
              - '.github/workflows/**'
            store:
              - 'services/fq-store/**'
              # grant_bus dev-depends on the shared broker guard and the
              # pinned nats-server it spawns (#233).
              - 'services/fq-test-support/**'
              - 'justfile'
              - 'rust-toolchain.toml'
              - '.nats-version'
              - '.nats-checksums'
              - '.github/workflows/**'
            go:
              - 'adapters/**'
              - 'justfile'
              - '.github/workflows/**'
            dashboard:
              - 'services/fq-dashboard/**'
              - 'scripts/dashboard-screenshots.sh'
              - 'scripts/dashboard-pr-comment.sh'
              - '.github/workflows/ci.yml'

  docs-lint:
    name: Docs lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # markdownlint runs via npx inside `just lint-docs`; setup-node
      # provides npx (a Rust container / minimal runner has none).
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - uses: extractions/setup-just@v3
      - run: just lint-docs
      # Relative-link integrity across all repo markdown (stdlib Python,
      # preinstalled on the runner).
      - run: just check-links

  runtime-ci:
    name: Runtime CI
    needs: changes
    runs-on: ubuntu-latest
    # sccache: a per-compilation-unit compiler cache over GitHub's Actions
    # cache backend, layered on top of rust-cache's whole-target/ cache.
    # HONEST CAVEAT (#51 Deliverable 6): this OVERLAPS rust-cache, which
    # already restores target/ — sccache's marginal value on CI is only
    # visible from this PR's own run (see `sccache --show-stats` at each
    # job's end). Keep it only if those numbers beat rust-cache alone; it
    # is isolated in one revertible commit. CARGO_INCREMENTAL=0 is required
    # (incremental compilation bypasses RUSTC_WRAPPER); rust-cache sets it
    # too, repeated here so the wiring is self-contained.
    env:
      SCCACHE_GHA_ENABLED: "true"
      RUSTC_WRAPPER: sccache
      CARGO_INCREMENTAL: "0"
    steps:
      - if: needs.changes.outputs.runtime != 'true'
        run: echo "No runtime-relevant changes — skipping the runtime build."
      - if: needs.changes.outputs.runtime == 'true'
        uses: actions/checkout@v4
      # Keep the version ref in lockstep with rust-toolchain.toml (#102) —
      # rustup enforces the pin either way; matching here avoids installing
      # a second, unused toolchain.
      - if: needs.changes.outputs.runtime == 'true'
        uses: dtolnay/rust-toolchain@1.95.0
        with:
          components: rustfmt, clippy
      - if: needs.changes.outputs.runtime == 'true'
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: services/fq-runtime
      # Installs sccache and points it at the GHA cache (reads SCCACHE_GHA_*).
      - if: needs.changes.outputs.runtime == 'true'
        uses: mozilla-actions/sccache-action@v0.0.10
      # The MCP integration tests spawn the reference server via npx.
      - if: needs.changes.outputs.runtime == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: "20"
      - if: needs.changes.outputs.runtime == 'true'
        uses: extractions/setup-just@v3
      # Install the pinned test broker (#233): tests that spawn their own
      # nats-server need the binary. Idempotent; version from .nats-version.
      - if: needs.changes.outputs.runtime == 'true'
        run: just install-nats
      - if: needs.changes.outputs.runtime == 'true'
        run: just runtime-ci
      # The shared test-only crate's own gate (#233) — its own workspace, so the
      # runtime gate only compiles it as a dep. Uses the nats-server installed
      # above.
      - if: needs.changes.outputs.runtime == 'true'
        run: just test-support-ci
      # Cache hit-rate for the keep/drop decision on sccache (see env note).
      - if: always() && needs.changes.outputs.runtime == 'true'
        run: sccache --show-stats

  store-ci:
    name: Store CI
    needs: changes
    runs-on: ubuntu-latest
    # sccache over the GHA backend — see the caveat on runtime-ci.
    env:
      SCCACHE_GHA_ENABLED: "true"
      RUSTC_WRAPPER: sccache
      CARGO_INCREMENTAL: "0"
    steps:
      - if: needs.changes.outputs.store != 'true'
        run: echo "No store-relevant changes — skipping the store build."
      - if: needs.changes.outputs.store == 'true'
        uses: actions/checkout@v4
      # Same lockstep note as runtime-ci: match rust-toolchain.toml.
      - if: needs.changes.outputs.store == 'true'
        uses: dtolnay/rust-toolchain@1.95.0
        with:
          components: rustfmt, clippy
      - if: needs.changes.outputs.store == 'true'
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: services/fq-store
      - if: needs.changes.outputs.store == 'true'
        uses: mozilla-actions/sccache-action@v0.0.10
      - if: needs.changes.outputs.store == 'true'
        uses: extractions/setup-just@v3
      # No Node toolchain needed. The grant-bus test spawns its own private
      # broker (#233); `just store-ci` provisions the pinned nats-server via
      # its `install-nats` dependency.
      - if: needs.changes.outputs.store == 'true'
        run: just store-ci
      # Cache hit-rate for the keep/drop decision on sccache.
      - if: always() && needs.changes.outputs.store == 'true'
        run: sccache --show-stats

  # Aggregate gate: keeps the "Rust CI" required-status-check name so the
  # runtime/store split needs no branch-protection change. Green iff both
  # halves are green; the Actions UI still shows which half failed.
  rust-ci:
    name: Rust CI
    needs: [runtime-ci, store-ci, dashboard-ci]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - run: |
          echo "runtime-ci:   ${{ needs.runtime-ci.result }}"
          echo "store-ci:     ${{ needs.store-ci.result }}"
          echo "dashboard-ci: ${{ needs.dashboard-ci.result }}"
          if [ "${{ needs.runtime-ci.result }}" != "success" ] || [ "${{ needs.store-ci.result }}" != "success" ] || [ "${{ needs.dashboard-ci.result }}" != "success" ]; then
            echo "::error::a Rust suite failed — see the Runtime CI / Store CI jobs above"
            exit 1
          fi

  dashboard-ci:
    name: Dashboard CI
    needs: changes
    runs-on: ubuntu-latest
    # fq-dashboard path-depends on fq-runtime (services/fq-dashboard/Cargo.toml),
    # so this job builds when EITHER changes — hence the `runtime || dashboard`
    # gate on every step (rather than a dedicated filter that would duplicate
    # the `runtime` globs). A pure fq-store change skips it.
    # sccache over the GHA backend — see the caveat on runtime-ci.
    env:
      SCCACHE_GHA_ENABLED: "true"
      RUSTC_WRAPPER: sccache
      CARGO_INCREMENTAL: "0"
    steps:
      - if: needs.changes.outputs.runtime != 'true' && needs.changes.outputs.dashboard != 'true'
        run: echo "No dashboard-relevant changes — skipping the dashboard build."
      - if: needs.changes.outputs.runtime == 'true' || needs.changes.outputs.dashboard == 'true'
        uses: actions/checkout@v4
      # Keep in lockstep with rust-toolchain.toml (#102).
      - if: needs.changes.outputs.runtime == 'true' || needs.changes.outputs.dashboard == 'true'
        uses: dtolnay/rust-toolchain@1.95.0
        with:
          components: rustfmt, clippy
      - if: needs.changes.outputs.runtime == 'true' || needs.changes.outputs.dashboard == 'true'
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: services/fq-dashboard
      - if: needs.changes.outputs.runtime == 'true' || needs.changes.outputs.dashboard == 'true'
        uses: mozilla-actions/sccache-action@v0.0.10
      - if: needs.changes.outputs.runtime == 'true' || needs.changes.outputs.dashboard == 'true'
        uses: extractions/setup-just@v3
      # Hermetic — the router tests spin their own read service over a
      # temp DB; no broker, no Node.
      - if: needs.changes.outputs.runtime == 'true' || needs.changes.outputs.dashboard == 'true'
        run: just dashboard-ci
      # Cache hit-rate for the keep/drop decision on sccache.
      - if: always() && (needs.changes.outputs.runtime == 'true' || needs.changes.outputs.dashboard == 'true')
        run: sccache --show-stats

  # Visual artifact, not a required check: when dashboard code changes,
  # render every page from deterministic fixtures and screenshot them
  # (headless chrome over file:// — no daemon, no broker), so the PR run
  # carries reviewable images of what the dashboard now looks like —
  # both as a run artifact and as a self-renewing gallery comment on
  # the PR (images hosted on the ci/dashboard-screenshots blob branch).
  dashboard-screenshots:
    name: Dashboard screenshots
    needs: changes
    runs-on: ubuntu-latest
    # Elevated for this job only: push the ci/dashboard-screenshots
    # branch + upsert the PR gallery comment. The workflow default
    # stays read-only.
    permissions:
      contents: write
      pull-requests: write
    steps:
      - if: needs.changes.outputs.dashboard != 'true'
        run: echo "No dashboard changes — skipping screenshots."
      - if: needs.changes.outputs.dashboard == 'true'
        uses: actions/checkout@v4
      # Keep in lockstep with rust-toolchain.toml (#102).
      - if: needs.changes.outputs.dashboard == 'true'
        uses: dtolnay/rust-toolchain@1.95.0
      - if: needs.changes.outputs.dashboard == 'true'
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            services/fq-dashboard
            services/fq-runtime
      - if: needs.changes.outputs.dashboard == 'true'
        uses: extractions/setup-just@v3
      # ubuntu-latest ships google-chrome; the script resolves it.
      - if: needs.changes.outputs.dashboard == 'true'
        run: just dashboard-screenshots
      - if: needs.changes.outputs.dashboard == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: dashboard-screenshots
          path: dist/dashboard-screenshots/*.png
          if-no-files-found: error
      # The gallery comment: PR context only, and only for same-repo
      # branches (a fork PR's token is read-only anyway).
      - if: >-
          needs.changes.outputs.dashboard == 'true' &&
          github.event_name == 'pull_request' &&
          github.event.pull_request.head.repo.full_name == github.repository
        run: >-
          bash scripts/dashboard-pr-comment.sh dist/dashboard-screenshots
          "${{ github.event.pull_request.number }}"
          "${{ github.event.pull_request.head.sha }}"
        env:
          GH_TOKEN: ${{ github.token }}

  go-ci:
    name: Go adapters
    needs: changes
    runs-on: ubuntu-latest
    steps:
      - if: needs.changes.outputs.go != 'true'
        run: echo "No Go-relevant changes — skipping the build."
      - if: needs.changes.outputs.go == 'true'
        uses: actions/checkout@v4
      - if: needs.changes.outputs.go == 'true'
        uses: actions/setup-go@v5
        with:
          go-version-file: adapters/github-watcher/go.mod
      - if: needs.changes.outputs.go == 'true'
        uses: extractions/setup-just@v3
      - if: needs.changes.outputs.go == 'true'
        run: just go-ci
