# NATS Server Configuration for factor-q
#
# See docs/design/committed/storage-and-scaling.md for the size and scaling
# analysis that motivates the values below. The short version:
# factor-q uses NATS as its event source of truth, and at moderate
# usage the fq-events stream grows at a few hundred MB per day. These
# limits give us comfortable headroom without reserving huge swathes
# of RAM or disk.

# Container-internal listen address. Host exposure is governed by the
# compose port bindings (127.0.0.1 only — see
# infrastructure/docker-compose.yml); inside the container NATS must
# listen on all interfaces for the port mapping to reach it.
listen: 0.0.0.0:4222
http_port: 8222

# Token auth (project assessment 2026-07-05, critique #4). The value
# is a fixed development token — the localhost port binding is the
# primary control; the token additionally stops unauthenticated
# cross-talk from other local processes and makes auth mandatory, so
# republishing the port can never silently expose an open broker.
# Any non-local deployment must replace it.
authorization {
    token: "fq-dev-token"
}

jetstream {
    store_dir: /data/nats

    # In-memory JetStream storage cap. JetStream uses RAM as a write
    # buffer; the earlier 256 MB value was conservative for the
    # walking skeleton. 1 GB is still modest and gives meaningful
    # headroom for burst writes.
    max_memory_store: 1GB

    # File-backed JetStream storage cap. This is the total across all
    # streams. The fq-events stream is append-only and should be the
    # biggest consumer; 50 GB comfortably fits a month of moderate
    # use with S2 compression enabled on the stream. Users running
    # heavier workloads should raise this alongside the stream's
    # retention settings.
    max_file_store: 50GB
}
